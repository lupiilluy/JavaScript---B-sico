<!DOCTYPE html>
<html lang="pt-br">
<body>

    <h1>Exercícios Integrados</h1>

    <h3>1. Positivo, Negativo ou Zero</h3>
    <input type="number" id="inputTernario" placeholder="Digite um número">
    <button onclick="verificarTernario()">Verificar</button>
    <p id="resTernario"></p>

    <hr>

    <h3>2. Contagem Regressiva</h3>
    <input type="number" id="inputWhile" placeholder="Começar em...">
    <button onclick="iniciarWhile()">Contar</button>
    <p id="resWhile"></p>

    <hr>

    <h3>3. Dados de Pessoa</h3>
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="idade" placeholder="Idade">
    <input type="text" id="cidade" placeholder="Cidade">
    <button onclick="gerarPessoa()">Listar Dados</button>
    <p id="resPessoa"></p>

    <hr>

    <h3>4. Processar Array [2, 5, 8, 11, 14]</h3>
    <button onclick="processarArray()">Filtrar > 5 e Dobrar</button>
    <p id="resArray"></p>

    <script>
        
        function verificarTernario() {
            const n = Number(document.getElementById('inputTernario').value);
            const res = (n > 0) ? "Positivo" : (n < 0) ? "Negativo" : "Zero";
            document.getElementById('resTernario').innerText = "Resultado: " + res;
        }

        
        function iniciarWhile() {
            let valor = Number(document.getElementById('inputWhile').value);
            let display = document.getElementById('resWhile');
            display.innerText = "Sequência: ";
            while (valor >= 0) {
                display.innerText += valor + " ";
                valor--;
            }
        }

        
        function gerarPessoa() {
            const pessoa = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                cidade: document.getElementById('cidade').value
            };
            let display = document.getElementById('resPessoa');
            display.innerText = ""; 
            for (let chave in pessoa) {
                display.innerText += `${chave}: ${pessoa[chave]} | `;
            }
        }

       
        function processarArray() {
            const numeros = [2, 5, 8, 11, 14];
            const resultado = numeros.filter(n => n > 5).map(n => n * 2);
            document.getElementById('resArray').innerText = "Resultado: " + resultado.join(" - ");
        }
    </script>

</body>
</html>
