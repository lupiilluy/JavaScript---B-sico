<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Verificar Idade</h3>
    <p>(aperte F12)</p>

    <script>

let idade = Number(prompt(`Insira sua idade: `))
if (idade <12)
{
    alert(`Sua idade é ${idade}, você é uma criança.`)
} 

else if (idade >=12, idade <=17)
{
    alert(`Sua idade é ${idade}, você é um adolescente.`)
}

else {
    alert(`Sua idade é ${idade}, você é um adulto.`)
}

    </script>
</body>
</html>
