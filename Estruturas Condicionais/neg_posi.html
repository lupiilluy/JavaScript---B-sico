<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Negativo e Positivo</h3>

    <script>
        let num = Number(prompt(`Digite um número:`))

        console.log("O número é ", (num > 0) ? "Positivo" : (num < 0) ? "Negativo" : "Zero");
    </script>
</body>
</html>
