<body>
    
<h3>Par ou Ímpar</h3>

<script>
    let num = Number(prompt(`Digite o número:`))

    if (num % 2==0) {
        alert(`PAR.`)
    }

    else {
        alert(`ÍMPAR.`)
    }

</script>
