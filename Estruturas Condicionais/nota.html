<body>
    
<h3>Nota de alunos</h3>

<script>

    let nota = Number(prompt(`Digite sua nota de 0 a 10:`))

if (nota >= 7) {
    alert(`Aprovado!`)
}

else if (nota >=5 && nota <7) {
    alert(`Recuperação.`)
}

else { 
    alert (`Reprovado!`)
}

</script>
