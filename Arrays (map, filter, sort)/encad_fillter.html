<body>
    <h3>Encadeando Método</h3>

    <script>
const num = [2, 5, 8, 11, 14];

const result = num
    .filter(num => num > 5) 
    .map(num => num * 2); 

console.log("Todos os números:", num);

console.log("Resultado:", result);
    </script>
</body>
