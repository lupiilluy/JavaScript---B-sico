    <h3>Filtrar Números Pares</h3>

    <script>
        const numeros = [1, 2, 3, 4, 5];

const par = numeros.filter(function(num) {
    return num % 2 ===0;
});

console.log("Todos os númerosl:", numeros);

console.log("Pares:", par);
    </script>
