<body>
    <h3>Dobrar Valores</h3>

    <script>
const numeros = [1, 2, 3, 4, 5];

const dobrados = numeros.map(function(num) {
    return num * 2;
});

console.log("Original:", numeros);

console.log("Dobrados:", dobrados);
    </script>
